<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="インターンサーチ">
  <link rel="manifest" href="manifest.webmanifest?v=5">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="style.css?v=11">
  <title>インターンサーチ</title>
</head>
<body>
  <header class="masthead">
    <div class="brand-block">
      <p class="eyebrow">MYNAVI 2028 / PERSONAL INTERNSHIP BOARD</p>
      <h1>インターンサーチ</h1>
      <p class="lead">探す、残す、確認する。交通費あり募集の個人ボード。</p>
    </div>
    <button id="refresh" class="icon-button" aria-label="データを更新">更新</button>
  </header>

  <main>
    <section class="login-dock" aria-label="利用者">
      <div class="login-copy">
        <span>現在の利用者</span>
        <strong id="activeUserName">自分</strong>
        <small>公開ページには名前を出さず、カード上は匿名人数だけ表示します。この端末のブラウザ保存で切り替えます。</small>
      </div>
      <label class="field compact-field">切替
        <select id="userSelect"></select>
      </label>
      <form id="userForm" class="user-form">
        <label class="field compact-field">新規/ログイン
          <input id="userNameInput" type="text" autocomplete="name" placeholder="名前を入力">
        </label>
        <button type="submit" class="secondary">入る</button>
      </form>
      <span id="userCount" class="user-count">1人</span>
    </section>

    <section class="status-dock" aria-label="応募管理">
      <nav class="view-tabs" aria-label="表示切替">
        <button class="view-tab active" type="button" data-view="all">検索</button>
        <button class="view-tab" type="button" data-view="favorite">お気に入り <span id="tabFavoriteCount">0</span></button>
        <button class="view-tab" type="button" data-view="checking">確認中 <span id="tabCheckingCount">0</span></button>
        <button class="view-tab" type="button" data-view="planned">参加予定 <span id="tabPlannedCount">0</span></button>
        <button class="view-tab" type="button" data-view="confirmed">確定 <span id="tabConfirmedCount">0</span></button>
      </nav>
      <div class="stage-cards">
        <button class="stage-card" type="button" data-view="favorite">
          <span>お気に入り</span>
          <strong id="favoriteCount">0</strong>
        </button>
        <button class="stage-card" type="button" data-view="checking">
          <span>確認中</span>
          <strong id="checkingCount">0</strong>
        </button>
        <button class="stage-card" type="button" data-view="planned">
          <span>参加予定</span>
          <strong id="plannedCount">0</strong>
        </button>
        <button class="stage-card stage-card-final" type="button" data-view="confirmed">
          <span>確定</span>
          <strong id="confirmedCount">0</strong>
        </button>
      </div>
    </section>

    <section class="panel control-deck" aria-label="検索条件">
      <div class="search-row">
        <label class="field search-field">検索
          <input id="query" type="search" placeholder="企業名・コース・開催地・業種">
        </label>
        <button id="clearFilters" type="button" class="secondary">条件を初期化</button>
      </div>

      <div class="filter-grid">
        <label class="field">最低支給額
          <select id="minAmount">
            <option value="0">指定なし</option>
            <option value="10000">1万円以上</option>
            <option value="20000">2万円以上</option>
            <option value="30000">3万円以上</option>
            <option value="50000">5万円以上</option>
            <option value="99999999">全額・実費のみ</option>
          </select>
        </label>
        <label class="field">地方
          <select id="regionFilter">
            <option value="">すべて</option>
          </select>
        </label>
        <label class="field">開催日（開始）
          <input id="dateFrom" type="date">
        </label>
        <label class="field">開催日（終了）
          <input id="dateTo" type="date">
        </label>
        <label class="field">並び順
          <select id="sortBy">
            <option value="amount">交通費が高い順</option>
            <option value="date">開催日が近い順</option>
            <option value="updated">更新が新しい順</option>
            <option value="company">企業名順</option>
          </select>
        </label>
      </div>

      <section class="map-console" aria-label="日本地図で都道府県を選択">
        <div class="map-topline">
          <div>
            <h2>地図から選択</h2>
            <p id="mapHint">地方を押すと拡大、都道府県を押すと複数選択できます。</p>
          </div>
          <button id="mapReset" type="button" class="secondary">全国へ戻る</button>
        </div>
        <div class="region-rail" id="regionRail" aria-label="地方ショートカット"></div>
        <div class="map-stage" id="mapStage"></div>
      </section>

      <div class="facet-grid">
        <section class="facet" aria-label="業種">
          <div class="facet-head">
            <h2>業種</h2>
            <button id="clearIndustries" type="button">解除</button>
          </div>
          <div id="industryOptions" class="check-list"></div>
        </section>
        <section class="facet" aria-label="都道府県">
          <div class="facet-head">
            <h2>都道府県</h2>
            <button id="clearPrefectures" type="button">解除</button>
          </div>
          <div id="prefectureOptions" class="check-list"></div>
        </section>
      </div>

      <div class="switchboard" aria-label="追加条件">
        <label class="switch"><input type="checkbox" id="oneDayOnly"><span>1Dayあり</span></label>
        <label class="switch"><input type="checkbox" id="multiDayOnly"><span>複数日あり</span></label>
        <label class="switch"><input type="checkbox" id="excludeUnknown"><span>金額不明を除外</span></label>
        <label class="switch"><input type="checkbox" id="lodgingOnly"><span>宿泊費あり</span></label>
        <label class="switch"><input type="checkbox" id="includeUnknownDates"><span>日付未定も含める</span></label>
        <label class="switch"><input type="checkbox" id="showClosed"><span>終了・満席も表示</span></label>
      </div>

      <div id="activeFilters" class="active-filters" aria-live="polite"></div>
    </section>

    <div class="summary">
      <div class="count-block"><span id="count">0件</span><span id="range"></span></div>
      <span id="updatedAt"></span>
    </div>
    <nav class="pager" aria-label="ページ操作">
      <label class="field page-size">表示件数
        <select id="pageSize">
          <option value="25">25件</option>
          <option value="50" selected>50件</option>
          <option value="100">100件</option>
          <option value="200">200件</option>
        </select>
      </label>
      <div class="pager-buttons">
        <button id="prevPage" type="button" class="secondary">前へ</button>
        <span id="pageStatus">1 / 1</span>
        <button id="nextPage" type="button" class="secondary">次へ</button>
      </div>
    </nav>
    <section id="results" class="cards" aria-live="polite"></section>
    <nav class="pager pager-bottom" aria-label="ページ操作（下部）">
      <div class="pager-buttons">
        <button id="prevPageBottom" type="button" class="secondary">前へ</button>
        <span id="pageStatusBottom">1 / 1</span>
        <button id="nextPageBottom" type="button" class="secondary">次へ</button>
      </div>
    </nav>
    <p id="empty" class="empty" hidden>条件に一致する募集はありません。</p>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-top">
        <div><p class="status"></p><h2></h2><p class="course"></p></div>
        <button class="favorite" type="button" aria-label="お気に入り">☆</button>
      </div>
      <div class="tags"></div>
      <div class="people" aria-label="だれが行きそうか" hidden></div>
      <div class="decision-bar" aria-label="応募状態">
        <button type="button" data-stage="checking">確認中</button>
        <button type="button" data-stage="planned">参加予定</button>
        <button type="button" data-stage="confirmed">確定</button>
        <button type="button" data-stage="">解除</button>
      </div>
      <dl>
        <div><dt>交通費</dt><dd class="transport"></dd></div>
        <div><dt>業種</dt><dd class="industries"></dd></div>
        <div><dt>宿泊費</dt><dd class="lodging"></dd></div>
        <div><dt>開催地</dt><dd class="locations"></dd></div>
        <div><dt>開催日</dt><dd class="dates"></dd></div>
        <div><dt>確認日時</dt><dd class="checked"></dd></div>
      </dl>
      <p class="original"></p>
      <a class="open" target="_blank" rel="noopener noreferrer">マイナビで詳細を見る</a>
    </article>
  </template>

  <script src="app.js?v=11" defer></script>
</body>
</html>
