name: Refresh existing internships
on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
permissions:
  contents: write
concurrency:
  group: mynavi-data-writer
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/scrape.py --mode refresh --limit 120
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json data/catalog.json data/crawl_state.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh existing internships"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
