name: Discover new internships
on:
  workflow_dispatch:
    inputs:
      full_scan:
        description: '初回用: 一覧を最後まで巡回し、交通費ありの募集を全件収集する'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '7,37 * * * *'
permissions:
  contents: write
concurrency:
  group: mynavi-data-writer
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Collect course data
        run: |
          if [ "${{ github.event.inputs.full_scan }}" = "true" ]; then
            python scripts/scrape.py --mode discover --limit 0 --list-pages 0
          else
            python scripts/scrape.py --mode discover --limit 90
          fi
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json data/catalog.json data/crawl_state.json
          git diff --cached --quiet && exit 0
          git commit -m "Discover new internships"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
