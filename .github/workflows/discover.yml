name: Discover new internships
on:
  workflow_dispatch:
    inputs:
      full_scan:
        description: '初回用: 一覧を最後まで巡回し、交通費ありの募集を全件収集する'
        required: false
        default: false
        type: boolean
      detail_batch:
        description: '初回用: 収集済みカタログの詳細DB化を分割継続する'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '7,37 * * * *'
permissions:
  contents: write
  actions: write
concurrency:
  group: mynavi-data-writer
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v4
        if: ${{ github.event.inputs.full_scan == 'true' }}
        with:
          node-version: '22'
      - run: pip install -r requirements.txt
      - name: Install browser crawler
        if: ${{ github.event.inputs.full_scan == 'true' }}
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Build full catalog
        if: ${{ github.event.inputs.full_scan == 'true' }}
        run: node scripts/discover_browser.js --max-pages 0 --delay-ms 1500
      - name: Commit full catalog
        if: ${{ github.event.inputs.full_scan == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json data/crawl_state.json
          git diff --cached --quiet && exit 0
          git commit -m "Update full internship catalog"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
      - name: Collect course data
        run: |
          if [ "${{ github.event.inputs.full_scan }}" = "true" ] || [ "${{ github.event.inputs.detail_batch }}" = "true" ]; then
            python scripts/scrape.py --mode rebuild --limit 500
          else
            python scripts/scrape.py --mode discover --limit 180
          fi
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json data/items.json data/catalog.json data/crawl_state.json
          git diff --cached --quiet && exit 0
          git commit -m "Discover new internships"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
      - name: Continue initial detail crawl
        if: ${{ github.event.inputs.full_scan == 'true' || github.event.inputs.detail_batch == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REMAINING="$(python scripts/remaining_details.py)"
          echo "remaining detail pages: ${REMAINING}"
          if [ "${REMAINING}" -gt 0 ]; then
            curl -sS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/discover.yml/dispatches" \
              -d "{\"ref\":\"${GITHUB_REF_NAME}\",\"inputs\":{\"detail_batch\":\"true\"}}"
          fi
